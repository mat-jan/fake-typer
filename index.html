
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake Typer Pro - Identical Layout</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --text-color: #39ff14;
            --accent-color: #58a6ff;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            overflow: hidden;
        }

        /* Overlay startowy */
        #setup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0d1117;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .container {
            width: 80%;
            max-width: 800px;
        }

        textarea {
            width: 100%;
            height: 300px;
            background: #161b22;
            color: #c9d1d9;
            border: 2px solid #30363d;
            border-radius: 6px;
            padding: 15px;
            font-family: monospace;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
        }

        textarea:focus {
            border-color: var(--accent-color);
        }

        .btn {
            margin-top: 20px;
            background: #238636;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            width: 100%;
        }

        /* GŁÓWNY OBSZAR PISANIA */
        #screen {
            width: 100%;
            height: 100vh;
            padding: 25px;
            box-sizing: border-box;
            overflow-y: auto;
            display: none;
            /* To zachowuje identyczny układ tekstu: spacje, tabulatory, entery */
            white-space: pre-wrap; 
            word-wrap: break-word;
            font-size: 18px;
            line-height: 1.4;
        }

        #cursor {
            display: inline-block;
            width: 10px;
            height: 20px;
            background: var(--text-color);
            margin-left: 2px;
            vertical-align: middle;
            animation: blink 0.8s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .hint {
            position: fixed;
            bottom: 10px;
            right: 20px;
            color: #444;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div id="setup-overlay">
        <div class="container">
            <h2 style="color: white; margin-bottom: 10px;">Fake Typer - Zachowanie Układu</h2>
            <p style="color: #8b949e; margin-bottom: 20px;">Wklej tekst (zachowamy spacje, tabulatory i entery):</p>
            <textarea id="source-text" placeholder="Wklej tutaj np. kod źródłowy..."></textarea>
            <button class="btn" onclick="start()">URUCHOM SYMULACJĘ</button>
        </div>
    </div>

    <div id="screen"></div>
    <div class="hint">ESC - powrót</div>

    <script>
        let fullText = "";
        let currentIndex = 0;
        const screen = document.getElementById('screen');
        const setup = document.getElementById('setup-overlay');
        const input = document.getElementById('source-text');

        function start() {
            fullText = input.value;
            if(!fullText) return alert("Wklej tekst!");
            
            currentIndex = 0;
            screen.innerHTML = '<span id="output"></span><span id="cursor"></span>';
            setup.style.display = 'none';
            screen.style.display = 'block';
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === "Escape") {
                setup.style.display = 'flex';
                screen.style.display = 'none';
                return;
            }

            // Sprawdzamy czy symulacja trwa
            if (screen.style.display === 'block') {
                e.preventDefault();
                
                // Ignoruj klawisze systemowe
                if (e.key.length > 1 && e.key !== "Enter" && e.key !== "Backspace") return;

                // Dodaj 3 znaki przy każdym kliknięciu dla efektu tempa
                for(let i=0; i<3; i++) {
                    if (currentIndex < fullText.length) {
                        const output = document.getElementById('output');
                        output.textContent += fullText[currentIndex];
                        currentIndex++;
                    }
                }
                
                // Automatyczne przewijanie do kursora
                screen.scrollTop = screen.scrollHeight;
            }
        });
    </script>
</body>
</html>
